# nginx/nginx.conf — Production hardened configuration
# Soite Kotikuntoutus Feedback System

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ── Basic settings ────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   30;
    types_hash_max_size 2048;
    server_tokens       off;   # do not reveal nginx version

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    # Log format: timestamp, method, URI, status, bytes, referer, user-agent, request_id
    # NEVER log request body — could contain patient data
    log_format main '$time_iso8601 $request_method $uri $status '
                    '$body_bytes_sent "$http_referer" "$http_user_agent" '
                    '$http_x_request_id';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Shared memory zones: 10m holds ~160,000 IPs
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/m;
    limit_req_zone $binary_remote_addr zone=feedback:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=60r/m;
    limit_req_status 429;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;

    # ── SSL configuration ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;   # forward secrecy: no session ticket reuse
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout          5s;

    # ── Upstream ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;            # persistent connections to FastAPI
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen      80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name _;           # replace with actual domain in production

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── Request size limits ───────────────────────────────────────────────
        client_max_body_size    50k;    # feedback payload max 50 KB
        client_body_timeout     10s;
        client_header_timeout   10s;
        send_timeout            10s;

        # ── Security headers (on every response) ─────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "DENY"                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

        # ── robots.txt ────────────────────────────────────────────────────────
        location = /robots.txt {
            return 200 "User-agent: *\nDisallow: /\n";
            add_header Content-Type text/plain;
        }

        # ── security.txt (RFC 9116) ───────────────────────────────────────────
        location = /.well-known/security.txt {
            return 200 "Contact: mailto:ali.pourrahim@centria.fi\nExpires: 2027-01-01T00:00:00.000Z\n";
            add_header Content-Type text/plain;
        }

        # ── Health check (no rate limit, no auth) ─────────────────────────────
        location = /health {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_read_timeout    5s;
            access_log off;    # do not clutter logs with health checks
        }

        # ── Auth endpoints: strict rate limit ─────────────────────────────────
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout   30s;
        }

        # ── Feedback submit: per-IP rate limit ───────────────────────────────
        location = /api/v1/feedback {
            limit_req zone=feedback burst=2 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout   10s;
        }

        # ── All other API endpoints ───────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";   # enable keepalive to upstream
            proxy_connect_timeout 5s;
            proxy_read_timeout   60s;
        }

        # ── Frontend static files (React build) ───────────────────────────────
        location / {
            root      /var/www/html;
            index     index.html;
            try_files $uri $uri/ /index.html;   # SPA fallback

            # Cache static assets aggressively (they are content-hashed)
            location ~* \.(js|css|png|svg|ico|woff2)$ {
                expires     1y;
                add_header  Cache-Control "public, immutable";
            }

            # Never cache index.html (entry point must always be fresh)
            location = /index.html {
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
    }
}

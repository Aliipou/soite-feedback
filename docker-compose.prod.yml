version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - frontend_build:/var/www/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks: [soite_net]
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  backend:
    image: soite-feedback-backend:${APP_VERSION:-1.0.0}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      PGCRYPTO_KEY: ${PGCRYPTO_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENVIRONMENT: production
      APP_VERSION: ${APP_VERSION:-1.0.0}
    command: >
      gunicorn app.main:app
        -k uvicorn.workers.UvicornWorker
        --workers 3
        --bind 0.0.0.0:8000
        --timeout 30
        --graceful-timeout 10
        --keep-alive 5
        --log-level warning
        --access-logfile -
        --error-logfile -
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [soite_net]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: soite_feedback
      POSTGRES_USER: soite_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soite_app -d soite_feedback"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [soite_net]
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks: [soite_net]
    deploy:
      resources:
        limits:
          memory: 96m
          cpus: "0.25"

  backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: soite_feedback
      POSTGRES_USER: soite_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "30"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "3"
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks: [soite_net]

volumes:
  pg_data:
  frontend_build:

networks:
  soite_net:
    internal: true
